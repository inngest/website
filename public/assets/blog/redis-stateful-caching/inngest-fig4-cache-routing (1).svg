<svg xmlns="http://www.w3.org/2000/svg" width="1384" height="946" viewBox="0 0 692 473"><style>@import url("https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;700&amp;family=IBM+Plex+Sans:wght@300;400;500;600&amp;display=swap");
:root { --bg: #0e0e0e; --bg-2: #161616; --bg-3: #1e1e1e; --border: #2a2a2a; --text: #e8e8e8; --text-muted: #888; --green: #6dff47; --blue: #2563ff; --red: #ff5c47; --mono: 'JetBrains Mono', monospace; --sans: 'IBM Plex Sans', sans-serif; }
* { box-sizing: border-box; margin: 0px; padding: 0px; }
body { background: var(--bg); color: var(--text); font-family: var(--sans); font-size: 17px; line-height: 1.75; -webkit-font-smoothing: antialiased; }
.container { max-width: 740px; margin: 0px auto; padding: 0px 24px; }
.post-header { padding: 64px 0px 48px; border-bottom: 1px solid var(--border); margin-bottom: 56px; }
.post-tag { font-family: var(--mono); font-size: 11px; letter-spacing: 0.12em; color: var(--green); text-transform: uppercase; margin-bottom: 20px; display: block; }
h1 { font-family: var(--mono); font-size: clamp(22px, 4vw, 32px); font-weight: 700; line-height: 1.25; letter-spacing: -0.02em; margin-bottom: 20px; color: rgb(255, 255, 255); }
.post-meta { font-family: var(--mono); font-size: 12px; color: var(--text-muted); display: flex; gap: 24px; flex-wrap: wrap; }
.post-meta span { display: flex; align-items: center; gap: 6px; }
p { margin-bottom: 20px; color: rgb(204, 204, 204); font-weight: 300; }
p strong { color: var(--text); font-weight: 500; }
h2 { font-family: var(--mono); font-size: 18px; font-weight: 700; letter-spacing: -0.01em; color: rgb(255, 255, 255); margin: 56px 0px 16px; padding-top: 0px; }
h2::before { content: "// "; color: var(--green); }
h3 { font-family: var(--mono); font-size: 14px; font-weight: 500; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.08em; margin: 36px 0px 12px; }
pre { background: var(--bg-3); border-top-color: ; border-top-style: ; border-top-width: ; border-right-color: ; border-right-style: ; border-right-width: ; border-bottom-color: ; border-bottom-style: ; border-bottom-width: ; border-image-source: ; border-image-slice: ; border-image-width: ; border-image-outset: ; border-image-repeat: ; border-left: 3px solid var(--blue); border-radius: 4px; padding: 20px 24px; margin: 24px 0px; overflow-x: auto; font-family: var(--mono); font-size: 13px; line-height: 1.7; color: rgb(204, 204, 204); }
code { font-family: var(--mono); font-size: 13px; background: var(--bg-3); border: 1px solid var(--border); border-radius: 3px; padding: 2px 6px; color: var(--green); }
pre code { background: none; border: none; padding: 0px; color: inherit; }
.comment { color: rgb(85, 85, 85); }
.keyword { color: var(--blue); }
.string { color: var(--green); }
.type { color: rgb(200, 162, 255); }
.callout { background: var(--bg-2); border-top-color: ; border-top-style: ; border-top-width: ; border-right-color: ; border-right-style: ; border-right-width: ; border-bottom-color: ; border-bottom-style: ; border-bottom-width: ; border-image-source: ; border-image-slice: ; border-image-width: ; border-image-outset: ; border-image-repeat: ; border-left: 3px solid var(--green); border-radius: 4px; padding: 20px 24px; margin: 32px 0px; font-size: 15px; color: rgb(170, 170, 170); }
.callout strong { color: var(--green); }
.diagram-wrap { margin: 40px 0px; border: 1px solid var(--border); border-radius: 6px; overflow: hidden; }
.diagram-label { background: var(--bg-3); border-bottom: 1px solid var(--border); padding: 10px 20px; font-family: var(--mono); font-size: 11px; color: var(--text-muted); letter-spacing: 0.08em; text-transform: uppercase; display: flex; align-items: center; justify-content: space-between; gap: 12px; }
.diagram-dot { width: 8px; height: 8px; border-radius: 50%; background: var(--green); display: inline-block; flex-shrink: 0; }
.diagram-body { background: var(--bg-2); padding: 32px 24px; }
.arch-flow { display: flex; align-items: center; gap: 0px; flex-wrap: wrap; justify-content: center; }
.arch-node { background: var(--bg-3); border: 1px solid var(--border); border-radius: 4px; padding: 12px 18px; font-family: var(--mono); font-size: 12px; text-align: center; min-width: 120px; position: relative; }
.arch-node .node-label { font-size: 10px; color: var(--text-muted); margin-bottom: 4px; text-transform: uppercase; letter-spacing: 0.06em; }
.arch-node .node-name { color: var(--text); font-weight: 500; }
.arch-node.highlight-green { border-color: var(--green); }
.arch-node.highlight-green .node-name { color: var(--green); }
.arch-node.highlight-blue { border-color: var(--blue); }
.arch-node.highlight-blue .node-name { color: rgb(102, 153, 255); }
.arch-node.highlight-red { border-color: var(--red); }
.arch-node.highlight-red .node-name { color: var(--red); }
.arch-arrow { font-size: 18px; color: var(--border); padding: 0px 8px; flex-shrink: 0; }
.arch-stack { display: flex; flex-direction: column; gap: 8px; align-items: center; }
.arch-stack-label { font-family: var(--mono); font-size: 10px; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.06em; margin-bottom: 4px; text-align: center; }
.chart-container { padding: 24px; }
.chart-title { font-family: var(--mono); font-size: 12px; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.08em; margin-bottom: 24px; }
.bar-group { display: flex; align-items: flex-end; gap: 24px; height: 180px; padding-bottom: 32px; border-bottom: 1px solid var(--border); margin-bottom: 12px; position: relative; }
.bar-group::before { content: ""; position: absolute; inset: 0px 0px 32px; background: repeating-linear-gradient(transparent, transparent calc(25% - 1px), rgb(30, 30, 30) calc(25% - 1px), rgb(30, 30, 30) 25%); pointer-events: none; }
.bar-item { display: flex; flex-direction: column; align-items: center; gap: 0px; flex: 1 1 0%; height: 100%; justify-content: flex-end; }
.bar-value { font-family: var(--mono); font-size: 13px; font-weight: 700; margin-bottom: 6px; }
.bar { width: 100%; max-width: 80px; border-radius: 3px 3px 0px 0px; position: relative; transition: opacity 0.2s; }
.bar-before { background: var(--red); opacity: 0.8; height: 140px; }
.bar-after { background: var(--green); opacity: 0.9; height: 47px; }
.bar-label { font-family: var(--mono); font-size: 11px; color: var(--text-muted); text-align: center; margin-top: 8px; position: absolute; bottom: -28px; width: 100%; }
.chart-legend { display: flex; gap: 24px; margin-top: 16px; }
.legend-item { display: flex; align-items: center; gap: 8px; font-family: var(--mono); font-size: 11px; color: var(--text-muted); }
.legend-dot { width: 10px; height: 10px; border-radius: 2px; }
.cache-breakdown { display: grid; grid-template-columns: 1fr 1fr; gap: 1px; background: var(--border); border-radius: 4px; overflow: hidden; margin: 24px 0px; }
.cache-cell { background: var(--bg-3); padding: 20px; }
.cache-cell-label { font-family: var(--mono); font-size: 10px; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.08em; margin-bottom: 8px; }
.cache-cell-value { font-family: var(--mono); font-size: 28px; font-weight: 700; line-height: 1; margin-bottom: 4px; }
.cache-cell-sub { font-family: var(--mono); font-size: 11px; color: var(--text-muted); }
.cache-cell.green .cache-cell-value { color: var(--green); }
.cache-cell.red .cache-cell-value { color: var(--red); }
.cache-cell.blue .cache-cell-value { color: rgb(102, 153, 255); }
.cache-cell.muted .cache-cell-value { color: var(--text-muted); }
.hash-ring { display: flex; justify-content: center; align-items: center; padding: 32px; position: relative; }
.ring-svg { width: 280px; height: 280px; }
.rollout-phases { display: grid; grid-template-columns: repeat(3, 1fr); gap: 1px; background: var(--border); border-radius: 4px; overflow: hidden; }
.phase { background: var(--bg-3); padding: 20px; }
.phase-num { font-family: var(--mono); font-size: 10px; color: var(--text-muted); letter-spacing: 0.08em; text-transform: uppercase; margin-bottom: 8px; }
.phase-name { font-family: var(--mono); font-size: 13px; font-weight: 700; color: var(--green); margin-bottom: 8px; }
.phase-desc { font-family: var(--mono); font-size: 11px; color: var(--text-muted); line-height: 1.6; }
.screenshot-placeholder { background: var(--bg-3); border: 1px dashed var(--border); border-radius: 4px; padding: 48px 24px; text-align: center; margin: 32px 0px; }
.placeholder-icon { font-family: var(--mono); font-size: 11px; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.08em; margin-bottom: 8px; }
.placeholder-label { font-family: var(--mono); font-size: 13px; color: rgb(85, 85, 85); }
hr { border-right: none; border-bottom: none; border-left: none; border-image: initial; border-top: 1px solid var(--border); margin: 48px 0px; }
.post-footer { border-top: 1px solid var(--border); padding: 48px 0px 64px; margin-top: 64px; }
.footer-cta { background: var(--bg-2); border: 1px solid var(--border); border-radius: 6px; padding: 32px; }
.footer-cta-label { font-family: var(--mono); font-size: 10px; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.1em; margin-bottom: 8px; }
.footer-cta h3 { font-family: var(--mono); font-size: 16px; color: rgb(255, 255, 255); font-weight: 600; text-transform: none; letter-spacing: 0px; margin-bottom: 8px; }
.footer-cta p { font-size: 14px; margin-bottom: 0px; color: var(--text-muted); }
.diagram-label { display: flex; align-items: center; justify-content: space-between; }
.diagram-label-text { display: flex; align-items: center; gap: 8px; }
.download-btn { font-family: var(--mono); font-size: 10px; color: var(--text-muted); background: none; border: 1px solid var(--border); border-radius: 3px; padding: 3px 10px; cursor: pointer; letter-spacing: 0.06em; text-transform: uppercase; display: flex; align-items: center; gap: 5px; transition: color 0.15s, border-color 0.15s; flex-shrink: 0; }
.download-btn:hover { color: var(--green); border-color: var(--green); }
.download-btn svg { width: 10px; height: 10px; fill: currentcolor; }
.download-btn.loading { opacity: 0.5; pointer-events: none; }
@media (max-width: 600px) {
  .rollout-phases { grid-template-columns: 1fr; }
  .cache-breakdown { grid-template-columns: 1fr; }
  .arch-flow { flex-direction: column; }
  .arch-arrow { transform: rotate(90deg); }
  .bar-group { gap: 12px; }
}
