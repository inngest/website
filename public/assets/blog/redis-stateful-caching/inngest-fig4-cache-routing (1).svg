          <div class="cache-cell-value" style="font-size: 16px;">WAL off</div>
          <div class="cache-cell-sub">No recovery needed on restart</div>
          <div style="margin-top: 12px; font-family: var(--mono); font-size: 11px; color: #555; line-height: 1.7;">
            Larger MemTableSize,<br />higher StopWritesThreshold.
          </div>
        </div>
      </div>
    </div>
  </div></foreignObject></svg>