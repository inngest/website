<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 700 520" font-family="'Inter', 'Segoe UI', system-ui, sans-serif">
  <rect width="700" height="520" fill="#111" rx="6"/>

  <text x="40" y="36" fill="#eee" font-size="14" font-weight="600">Anatomy of a step transition</text>
  <text x="40" y="54" fill="#666" font-size="11">What happens between Step A completing and Step B starting</text>

  <!-- Step A -->
  <rect x="40" y="76" width="140" height="30" rx="4" fill="#222"/>
  <text x="110" y="96" text-anchor="middle" fill="#ccc" font-size="11" font-weight="500">Step A completes</text>

  <!-- Connector -->
  <line x1="110" y1="106" x2="110" y2="128" stroke="#333" stroke-width="1"/>

  <!-- Bracket -->
  <line x1="28" y1="128" x2="28" y2="432" stroke="#444" stroke-width="1"/>
  <line x1="24" y1="128" x2="32" y2="128" stroke="#444" stroke-width="1"/>
  <line x1="24" y1="432" x2="32" y2="432" stroke="#444" stroke-width="1"/>

  <!-- Row 1 -->
  <rect x="44" y="136" width="612" height="48" rx="3" fill="#1a1a1a" stroke="#282828" stroke-width="1"/>
  <text x="64" y="158" fill="#888" font-size="11" font-weight="600">1</text>
  <text x="84" y="158" fill="#ccc" font-size="11">Serialize step result</text>
  <text x="84" y="174" fill="#555" font-size="10">Encode output for persistence</text>
  <text x="628" y="164" text-anchor="end" fill="#888" font-size="11">~1–5ms</text>

  <!-- Row 2 -->
  <rect x="44" y="192" width="612" height="48" rx="3" fill="#1a1a1a" stroke="#282828" stroke-width="1"/>
  <text x="64" y="214" fill="#888" font-size="11" font-weight="600">2</text>
  <text x="84" y="214" fill="#ccc" font-size="11">Persist state to durable store</text>
  <text x="84" y="230" fill="#555" font-size="10">Synchronous round-trip — blocks until ACK</text>
  <text x="628" y="220" text-anchor="end" fill="#eee" font-size="11" font-weight="600">~5–50ms</text>

  <!-- Row 3 -->
  <rect x="44" y="248" width="612" height="48" rx="3" fill="#1a1a1a" stroke="#282828" stroke-width="1"/>
  <text x="64" y="270" fill="#888" font-size="11" font-weight="600">3</text>
  <text x="84" y="270" fill="#ccc" font-size="11">Enqueue next step</text>
  <text x="84" y="286" fill="#555" font-size="10">Write job to queue</text>
  <text x="628" y="276" text-anchor="end" fill="#888" font-size="11">~1–10ms</text>

  <!-- Row 4 -->
  <rect x="44" y="304" width="612" height="48" rx="3" fill="#1a1a1a" stroke="#282828" stroke-width="1"/>
  <text x="64" y="326" fill="#888" font-size="11" font-weight="600">4</text>
  <text x="84" y="326" fill="#ccc" font-size="11">Check constraints</text>
  <text x="84" y="342" fill="#555" font-size="10">Concurrency, throttling, rate limits — churns under load</text>
  <text x="628" y="332" text-anchor="end" fill="#eee" font-size="11" font-weight="600">~5–100ms+</text>

  <!-- Row 5 -->
  <rect x="44" y="360" width="612" height="48" rx="3" fill="#1a1a1a" stroke="#282828" stroke-width="1"/>
  <text x="64" y="382" fill="#888" font-size="11" font-weight="600">5</text>
  <text x="84" y="382" fill="#ccc" font-size="11">Worker picks up next step</text>
  <text x="84" y="398" fill="#555" font-size="10">Polling interval or push latency + lease</text>
  <text x="628" y="388" text-anchor="end" fill="#888" font-size="11">~10–200ms</text>

  <!-- Total -->
  <rect x="44" y="420" width="612" height="30" rx="3" fill="#222"/>
  <text x="64" y="440" fill="#eee" font-size="11" font-weight="600">Total</text>
  <text x="628" y="440" text-anchor="end" fill="#eee" font-size="11" font-weight="600">20ms best case → 500ms–2s under load</text>

  <!-- Connector -->
  <line x1="110" y1="450" x2="110" y2="470" stroke="#333" stroke-width="1"/>

  <!-- Step B -->
  <rect x="40" y="470" width="140" height="30" rx="4" fill="#222"/>
  <text x="110" y="490" text-anchor="middle" fill="#ccc" font-size="11" font-weight="500">Step B begins</text>
</svg>
