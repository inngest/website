name: On Deployment

on: push

jobs:
  wait_for_deploy_complete:
    runs-on: ubuntu-latest
    outputs:
      url: ${{ steps.deployment.outputs.url }}
    steps:
      - id: deployment
        uses: patrickedqvist/wait-for-vercel-preview@v1.3.3
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          max_timeout: 600
          check_interval: 20

      - name: Display deployment URL
        run: "echo Preview URL: ${{steps.deployment.outputs.url}}"

  check_links:
    runs-on: ubuntu-latest
    needs: wait_for_deploy_complete
    steps:
      - uses: actions/checkout@v4

      - name: Restore lychee cache
        uses: actions/cache@v4
        with:
          path: .lycheecache
          key: lychee-${{ github.sha }}
          restore-keys: lychee-

      - name: Run lychee
        uses: lycheeverse/lychee-action@v2
        with:
          args: >-
            --config lychee.toml
            --base ${{ needs.wait_for_deploy_complete.outputs.url }}
            --no-progress
            './content/**/*.mdx'
            './pages/**/*.{mdx,tsx}'
            './app/**/*.tsx'
          fail: true
          output: ./lychee-report.md

      - name: Upload report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: lychee-report
          path: lychee-report.md

      - name: Post summary
        if: always()
        run: cat lychee-report.md >> $GITHUB_STEP_SUMMARY

  algolia_crawler:
    runs-on: ubuntu-latest
    needs: wait_for_deploy_complete
    if: github.ref == 'refs/heads/main'
    steps:
      - name: Algolia crawler creation and crawl
        if: ${{ success() }}
        uses: algolia/algoliasearch-crawler-github-actions@v1.0.10
        id: algolia_crawler
        with:
          crawler-user-id: ${{ secrets.CRAWLER_USER_ID }}
          crawler-api-key: ${{ secrets.CRAWLER_API_KEY }}
          crawler-name: ${{ secrets.CRAWLER_NAME }}
          algolia-app-id: ${{ secrets.ALGOLIA_APP_ID }}
          algolia-api-key: ${{ secrets.ALGOLIA_API_KEY }}
          site-url: "https://www.inngest.com/docs"

  go:
    runs-on: "ubuntu-latest"
    steps:
      - uses: "actions/checkout@v4"
      - name: Setup
        uses: actions/setup-go@v3
        with:
          go-version: "1.25"
      - name: "Check"
        run: "make check"
        working-directory: "./snippets/go"

  py:
    runs-on: "ubuntu-latest"
    steps:
      - uses: "actions/checkout@v4"
      - name: "Install uv"
        uses: astral-sh/setup-uv@v4
        with:
          python-version: "3.10"
      - name: "Install"
        run: "make install"
        working-directory: "./snippets/py"
      - name: "Lint"
        run: "make lint"
        working-directory: "./snippets/py"
      - name: "Type check"
        run: "make type-check"
        working-directory: "./snippets/py"

  ts:
    runs-on: "ubuntu-latest"
    steps:
      - uses: "actions/checkout@v4"
      - name: "Install"
        run: "make install"
        working-directory: "./snippets/ts"
      - name: "Check"
        run: "make check"
        working-directory: "./snippets/ts"
